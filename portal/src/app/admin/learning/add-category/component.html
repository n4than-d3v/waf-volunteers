@if (adding) {
<form [formGroup]="form">
  <div class="field">
    <label for="name">
      Name
      <span class="required">*</span>
    </label>
    <input id="name" type="text" formControlName="name" />
  </div>
  <div class="field">
    <label for="youTube">YouTube video</label>
    <input type="text" formControlName="youTube" />
  </div>
  <div class="buttons with-space">
    <button class="button button--primary" (click)="save()">Save</button>
    <button class="button button--secondary" (click)="cancel()">Cancel</button>
  </div>
</form>
} @else {
<div class="buttons">
  <button class="button button--secondary add" (click)="adding = true">
    &plus;
  </button>
  @if (parent) { @if (!(parent.children && parent.children.length)) {
  <button class="button button--warning remove" (click)="remove()">
    &minus;
  </button>
  } }
</div>
}
