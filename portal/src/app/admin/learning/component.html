<h1>Husbandry learning</h1>

<p>This is what husbandry users see in their "Learning" page.</p>
<p>
  When adding YouTube videos, only use the <strong>ID</strong>, e.g.
  https://www.youtube.com/watch?v=<strong>EIyixC9NsLI</strong>
</p>

<br />

@if (loading$ | async) {
<spinner></spinner>
} @if (error$ | async) {
<div class="error">Error occurred</div>
} @if (categories$ | async; as categories) {
<admin-learning-categories-render [categories]="categories" [parent]="null" />
<admin-learning-categories-add [parent]="null" />
}
